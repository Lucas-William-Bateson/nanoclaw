name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy to Mac Mini
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan 100.94.15.7 >> ~/.ssh/known_hosts 2>/dev/null

          ssh -T -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -o PasswordAuthentication=no -o StrictHostKeyChecking=accept-new lucas@100.94.15.7 'set -e; if [ ! -d ~/nanoclaw ]; then git clone https://github.com/Lucas-William-Bateson/nanoclaw.git ~/nanoclaw; fi && cd ~/nanoclaw && git pull --ff-only && npm install --production && npm run build && launchctl kickstart -k gui/$(id -u)/com.nanoclaw && echo "Deploy complete"'
